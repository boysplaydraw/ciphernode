name: Docker Hub

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── Relay Sunucusu Image ──────────────────────────────────────
  build-relay:
    name: Build relay image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push relay
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            mero003/ciphernode:latest
            mero003/ciphernode:${{ github.sha }}
          cache-from: type=gha,scope=relay
          cache-to: type=gha,mode=max,scope=relay

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: mero003/ciphernode
          short-description: "Uçtan uca şifreli, Tor destekli anonim mesajlaşma relay sunucusu"
          readme-filepath: ./DOCKER_HUB.md

  # ── Web Uygulaması Image ──────────────────────────────────────
  build-web:
    name: Build web app image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            mero003/ciphernode-web:latest
            mero003/ciphernode-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
