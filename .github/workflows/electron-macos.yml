name: Electron macOS

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web
        run: npx expo export --platform web --output-dir dist

      - name: Compile Electron (esbuild)
        run: |
          npx esbuild electron/main.ts electron/tor-manager.ts electron/onion-share.ts electron/preload.ts \
            --platform=node \
            --external:electron \
            --bundle \
            --outdir=electron/dist \
            --format=cjs

      - name: Build macOS packages (x64 + arm64)
        run: npx electron-builder --config electron/electron-builder.json --mac --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        run: ls -lh dist-electron/

      - name: Upload DMG artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-x64
          path: dist-electron/*x64*.dmg
          if-no-files-found: warn

      - name: Upload DMG artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: dist-electron/*arm64*.dmg
          if-no-files-found: warn

      - name: Upload to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist-electron/*.dmg \
            dist-electron/*.zip \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
