name: "Publish Release"

on:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # macOS Apple Silicon & Intel
            goos: "darwin"
            goarch: "arm64"
            sidecar_name: "ciphernode-backend-aarch64-apple-darwin"
          - platform: "macos-latest"
            goos: "darwin"
            goarch: "amd64"
            sidecar_name: "ciphernode-backend-x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Linux Debian / AppImage
            goos: "linux"
            goarch: "amd64"
            sidecar_name: "ciphernode-backend-x86_64-unknown-linux-gnu"
          - platform: "windows-latest" # Windows exe / msi
            goos: "windows"
            goarch: "amd64"
            sidecar_name: "ciphernode-backend-x86_64-pc-windows-msvc.exe"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Node.js Kurulumu (Frontend için)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 2. Rust Kurulumu (Tauri Çekirdeği için)
      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # 3. Go Kurulumu (Backend Derlemesi için)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      # 4. Linux için Gerekli Webkit Kütüphanelerinin Yüklenmesi
      - name: Install Linux Dependencies (Ubuntu Only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 5. NPM Bağımlılıklarını Yükle
      - name: Install NPM Dependencies
        run: npm install

      # 6. Go Sidecar Sürecini Çapraz Derleme ile Derle
      - name: Compile Go Sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p src-tauri/binaries
          go build -ldflags="-s -w" -o src-tauri/binaries/${{ matrix.sidecar_name }} ./server-go

      # 7. Tauri Uygulamasını Paketle ve Derle
      - name: Build Tauri Application
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri.conf.json dosyasındaki sürüm numarasını otomatik okur
          releaseName: "CipherNode v__VERSION__"
          releaseDraft: true
          prerelease: false
