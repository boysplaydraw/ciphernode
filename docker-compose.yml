services:
  ciphernode-relay:
    image: mero003/ciphernode:latest
    container_name: ciphernode-relay
    restart: unless-stopped

    ports:
      # HTTPS — ana port (tarayici ve uygulama bu porta baglanir)
      - "443:443"
      # HTTP → HTTPS yonlendirme
      - "80:80"
      # Dogrudan HTTP erisim (ihtiyac halinde, orn: yerel gelistirme)
      - "5000:5000"

    env_file:
      - path: .env
        required: false

    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
      # Veritabani — ZORUNLU (.env dosyasinda tanimlayin)
      # Ornek: DATABASE_URL=postgresql://user:password@db:5432/ciphernode
      - DATABASE_URL=${DATABASE_URL}
      # SSL ayarlari
      # HTTPS=false  → HTTP modunda calis (port 5000)
      # SSL_DOMAIN=  → Bos birakinca otomatik self-signed sertifika uretilir
      # SSL_DOMAIN=relay.example.com → Let's Encrypt sertifikasi kullanilir
      - HTTPS=${HTTPS:-true}
      - SSL_DOMAIN=${SSL_DOMAIN:-}
      - SSL_EMAIL=${SSL_EMAIL:-}
      - SSL_PORT=${SSL_PORT:-443}
      - HTTP_REDIRECT_PORT=${HTTP_REDIRECT_PORT:-80}
      # Diger ayarlar
      - MESSAGE_TTL_MS=${MESSAGE_TTL_MS:-86400000}
      - FILE_TTL_MS=${FILE_TTL_MS:-86400000}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-100}
      - MAX_FILE_DOWNLOADS=${MAX_FILE_DOWNLOADS:-10}
      - ONION_ADDRESS=${ONION_ADDRESS:-}
      # Tor Hidden Service (opsiyonel)
      - TOR_ENABLED=${TOR_ENABLED:-false}

    volumes:
      # SSL sertifikalari — container yeniden baslatildiginda korunur
      - ciphernode-ssl:/app/ssl

    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          wget --no-verbose --tries=1 --no-check-certificate
          https://localhost:${SSL_PORT:-443}/api/health 2>/dev/null
          || wget --no-verbose --tries=1 --spider
          http://localhost:5000/api/health 2>/dev/null
          || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    # read_only kaldirildi — SSL dizinine yazma gerekiyor
    # ssl volume zaten izole edilmis

    tmpfs:
      - /tmp:size=100M,mode=1777

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    networks:
      - ciphernode-network

volumes:
  # SSL sertifikalari burada saklanir (container silinse bile korunur)
  ciphernode-ssl:
    driver: local

networks:
  ciphernode-network:
    driver: bridge
