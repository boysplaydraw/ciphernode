# ╔══════════════════════════════════════════════════════════════╗
# ║          CipherNode — Docker Compose Yapılandırması          ║
# ║                                                              ║
# ║  Servisler:                                                  ║
# ║    db              → PostgreSQL 16 veritabanı                ║
# ║    ciphernode-relay → CipherNode relay sunucusu              ║
# ║    certbot         → Let's Encrypt (yalnızca --profile ssl)  ║
# ║                                                              ║
# ║  Hızlı başlangıç (HTTP mod):                                 ║
# ║    cp .env.example .env && docker compose up -d              ║
# ║                                                              ║
# ║  Let's Encrypt ile (domain gerekli):                         ║
# ║    SSL_DOMAIN=relay.example.com \                            ║
# ║    SSL_EMAIL=admin@example.com \                             ║
# ║    docker compose --profile ssl run --rm certbot             ║
# ║    docker compose up -d                                      ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ── PostgreSQL Veritabanı ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ciphernode-db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       ciphernode
      POSTGRES_USER:     ciphernode
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ciphernode_secret}

    volumes:
      - ciphernode-db:/var/lib/postgresql/data

    networks:
      - ciphernode-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciphernode -d ciphernode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── CipherNode Relay Sunucusu ─────────────────────────────────
  ciphernode-relay:
    image: mero003/ciphernode:latest
    container_name: ciphernode-relay
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "${SSL_PORT:-443}:443"          # HTTPS
      - "${HTTP_REDIRECT_PORT:-80}:80"  # HTTP → HTTPS yönlendirme
      - "${PORT:-5000}:5000"            # HTTP doğrudan erişim

    env_file:
      - path: .env
        required: false

    environment:
      NODE_ENV:   production
      PORT:       ${PORT:-5000}
      HOST:       0.0.0.0

      DATABASE_URL: postgresql://ciphernode:${DB_PASSWORD:-ciphernode_secret}@db:5432/ciphernode

      # SSL / HTTPS
      # HTTPS=false          → HTTP modu (port 5000)
      # SSL_DOMAIN=           → self-signed sertifika otomatik üretilir
      # SSL_DOMAIN=relay.com  → certbot ile önceden alınan Let's Encrypt kullanılır
      HTTPS:              ${HTTPS:-true}
      SSL_DOMAIN:         ${SSL_DOMAIN:-}
      SSL_EMAIL:          ${SSL_EMAIL:-}
      SSL_PORT:           ${SSL_PORT:-443}
      HTTP_REDIRECT_PORT: ${HTTP_REDIRECT_PORT:-80}

      MESSAGE_TTL_MS:     ${MESSAGE_TTL_MS:-86400000}
      FILE_TTL_MS:        ${FILE_TTL_MS:-86400000}
      MAX_FILE_SIZE_MB:   ${MAX_FILE_SIZE_MB:-100}
      MAX_FILE_DOWNLOADS: ${MAX_FILE_DOWNLOADS:-10}

      TOR_ENABLED:   ${TOR_ENABLED:-false}
      ONION_ADDRESS: ${ONION_ADDRESS:-}

    volumes:
      # Self-signed sertifikalar burada saklanır
      - ciphernode-ssl:/app/ssl
      # Let's Encrypt sertifikaları — certbot container ile paylaşılır
      # (SSL_DOMAIN ayarlıysa sunucu buradan otomatik okur)
      - ciphernode-letsencrypt:/etc/letsencrypt:ro

    networks:
      - ciphernode-network

    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          wget --no-verbose --tries=1 --no-check-certificate
          https://localhost:${SSL_PORT:-443}/api/health 2>/dev/null
          || wget --no-verbose --tries=1 --spider
          http://localhost:${PORT:-5000}/api/health 2>/dev/null
          || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    tmpfs:
      - /tmp:size=100M,mode=1777

    deploy:
      resources:
        limits:
          cpus:   '1'
          memory: 512M
        reservations:
          cpus:   '0.25'
          memory: 128M

    labels:
      - "org.opencontainers.image.title=CipherNode"
      - "org.opencontainers.image.source=https://github.com/boysplaydraw/ciphernode"

  # ── Let's Encrypt (Certbot) ────────────────────────────────────
  # Yalnızca --profile ssl ile çalışır, normal başlatmada devreye GİRMEZ.
  #
  # İlk kurulum:
  #   SSL_DOMAIN=relay.example.com SSL_EMAIL=admin@example.com \
  #   docker compose --profile ssl run --rm certbot
  #
  # Sertifika yenileme (her ~60 günde bir):
  #   docker compose --profile ssl run --rm certbot
  #   docker compose restart ciphernode-relay
  certbot:
    image: certbot/certbot:latest
    container_name: ciphernode-certbot
    profiles: ["ssl"]

    # Sertifikaları relay servisiyle paylaşılan volume'a yazar
    volumes:
      - ciphernode-letsencrypt:/etc/letsencrypt

    # Port 80 standalone modda gerekiyor — Let's Encrypt bu porttan doğrular
    # (Relay servisi henüz çalışmıyorsa veya durdurulduysa kullanılabilir)
    network_mode: host

    environment:
      SSL_DOMAIN: ${SSL_DOMAIN}
      SSL_EMAIL:  ${SSL_EMAIL:-admin@${SSL_DOMAIN:-example.com}}

    # certonly: sertifika al (--standalone: kendi HTTP sunucusunu kullanır)
    # --keep-until-expiring: sertifika geçerliyse yeniden almaz
    command: >
      certonly
      --standalone
      --non-interactive
      --agree-tos
      --keep-until-expiring
      --email $${SSL_EMAIL:-admin@$${SSL_DOMAIN}}
      --domain $${SSL_DOMAIN}
      --http-01-port 80

# ── Volume'lar ─────────────────────────────────────────────────
volumes:
  ciphernode-db:
    driver: local
    labels:
      description: "CipherNode PostgreSQL veri dizini"

  ciphernode-ssl:
    driver: local
    labels:
      description: "CipherNode self-signed SSL sertifikaları"

  ciphernode-letsencrypt:
    driver: local
    labels:
      description: "CipherNode Let's Encrypt sertifikaları (certbot ile paylaşılan)"

# ── Network ───────────────────────────────────────────────────
networks:
  ciphernode-network:
    driver: bridge
