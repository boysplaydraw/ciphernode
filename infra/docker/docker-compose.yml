services:
  go-server:
    build:
      context: ../..
      dockerfile: server/go/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    environment:
      PORT: "5000"
      HOST: "0.0.0.0"
      RATE_LIMIT_PER_MINUTE: "120"
      MESSAGE_TTL: "24h"
      FILE_TTL: "24h"
      ONION_ADDRESS: "${ONION_ADDRESS:-}"
    ports:
      - "5000:5000"

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        EXPO_PUBLIC_SERVER_URL: "${EXPO_PUBLIC_SERVER_URL:-http://localhost:5000}"
        EXPO_PUBLIC_RELAY_TRANSPORT: "${EXPO_PUBLIC_RELAY_TRANSPORT:-websocket}"
    environment:
      EXPO_PUBLIC_SERVER_URL: "${EXPO_PUBLIC_SERVER_URL:-http://localhost:5000}"
      EXPO_PUBLIC_RELAY_TRANSPORT: "${EXPO_PUBLIC_RELAY_TRANSPORT:-websocket}"
    ports:
      - "8080:80"
    depends_on:
      - go-server

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"

  reverse-proxy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    environment:
      CADDY_SITE_ADDRESS: "${CADDY_SITE_ADDRESS:-:80}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - go-server
      - web

volumes:
  caddy-data:
  caddy-config:
