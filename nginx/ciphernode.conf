# CipherNode — Nginx Reverse Proxy Şablonu
# Kullanım: sudo cp nginx/ciphernode.conf /etc/nginx/sites-available/ciphernode
#            sudo ln -s /etc/nginx/sites-available/ciphernode /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
#
# AWS/GCloud/DigitalOcean/Hetzner üzerinde çalışır.
# SSL için setup-ssl.sh scriptini kullanın.

upstream ciphernode {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Güvenlik başlıkları
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Dosya yükleme limiti (MAX_FILE_SIZE_MB + buffer)
    client_max_body_size 150m;
    client_body_timeout 120s;

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass http://ciphernode;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API ve diğer tüm istekler
    location / {
        proxy_pass http://ciphernode;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
