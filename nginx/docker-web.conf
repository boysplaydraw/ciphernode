# ============================================================
# CipherNode — Nginx Docker Web Gateway
#
# Görev:
#   - /               → Expo SPA (static dosyalar)
#   - /api/*          → CipherNode relay (http://ciphernode:5000)
#   - /socket.io/*    → CipherNode relay (WebSocket proxy)
#
# Bu yapılandırma sayesinde web uygulaması ve relay aynı
# origin üzerinden sunulur. window.location.origin otomatik
# olarak doğru API URL'ini döndürür — kullanıcı ayarı gerekmez.
# ============================================================

server {
    listen 8080;
    server_name _;

    # Dosya yükleme limiti (relay ile aynı olmalı)
    client_max_body_size 150m;
    client_body_timeout 120s;

    # ── WebSocket (Socket.IO) ──────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://ciphernode:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API Proxy ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://ciphernode:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Expo SPA (Static Dosyalar) ─────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # React / Expo SPA için: bilinmeyen rotaları index.html'e yönlendir
        try_files $uri $uri/ /index.html;

        # Cache: HTML dosyaları cache'leme (SPA güncellemeleri için)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # JS/CSS/font dosyaları için agresif cache (content-hash'li dosyalar)
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Resimler ve diğer statik varlıklar
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
